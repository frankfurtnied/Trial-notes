<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Cadence</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Cadence">
  <meta name="theme-color" content="#14171D">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src * data: blob:; connect-src *; worker-src blob:;">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    :root {
      --bg: #14171D; --panel: #1D2129; --panel2: #242935; --line: #2F3542;
      --text: #EDEFF3; --dim: #8B93A3; --celeste: #53D6C5; --coral: #FF7A59; --amber: #FFC53D;
      --mono: 'SF Mono','Cascadia Mono','Roboto Mono',Menlo,Consolas,monospace;
      --sans: 'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); overscroll-behavior: none; }
    .wrap { max-width: 460px; margin: 0 auto; padding: 16px 14px calc(90px + env(safe-area-inset-bottom)); }

    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
    .logo { font-size:18px; font-weight:800; letter-spacing:0.02em; }
    .dot { color:var(--celeste); }
    .unit-toggle { background:var(--panel); color:var(--dim); border:1px solid var(--line); border-radius:10px; padding:6px 12px; font-family:var(--mono); font-size:12px; cursor:pointer; }

    .speed-box { background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:20px 16px 16px; text-align:center; margin-bottom:12px; }
    .speed-label { font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--dim); }
    .speed-big { font-family:var(--mono); font-size:68px; font-weight:700; line-height:1.05; font-variant-numeric:tabular-nums; color:var(--celeste); }
    .speed-big.paused { color:var(--dim); }
    .speed-unit { color:var(--dim); font-family:var(--mono); font-size:13px; }
    .gps-pill { display:inline-block; margin-top:8px; font-size:11px; font-family:var(--mono); color:var(--dim); background:var(--panel2); border:1px solid var(--line); border-radius:20px; padding:3px 10px; }

    .stat-row { display:flex; gap:8px; margin-bottom:8px; }
    .stat-tile { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px 14px; flex:1; min-width:0; }
    .stat-label { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--dim); }
    .stat-value { font-family:var(--mono); font-size:22px; font-weight:600; color:var(--text); margin-top:4px; font-variant-numeric:tabular-nums; }
    .stat-unit { font-size:12px; color:var(--dim); margin-left:4px; font-weight:400; }
    .max-col { color: var(--coral) !important; }

    .map-box { background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; position:relative; }
    .map { height:240px; width:100%; background:#0F1217; }
    .map-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--dim); font-size:13px; pointer-events:none; z-index:500; background:rgba(20,23,29,0.55); }
    .leaflet-container { font-family: var(--sans); }

    .controls { display:flex; gap:10px; margin-top:16px; }
    .btn { font-family:var(--sans); font-weight:700; font-size:16px; border:none; border-radius:14px; padding:16px 0; flex:1; cursor:pointer; }
    .btn-primary { background:var(--celeste); color:#10141A; }
    .btn-secondary { background:var(--panel2); color:var(--text); border:1px solid var(--line); }
    .btn-amber { background:var(--amber); color:#10141A; }
    .btn-coral { background:var(--coral); color:#fff; }

    .alert { margin-top:12px; border-radius:12px; padding:12px 14px; font-size:14px; line-height:1.4; }
    .alert-error { background:#2A1E1B; border:1px solid #4A2E26; color:#FFB59F; }
    .alert-success { background:#16302C; border:1px solid #1F4A43; color:var(--celeste); }

    .tab-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(20,23,29,0.96); border-top:1px solid var(--line); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); z-index:1000; }
    .tab-bar-inner { max-width:460px; margin:0 auto; display:flex; }
    .tab-btn { flex:1; background:none; border:none; border-top:2px solid transparent; padding:14px 0 calc(16px + env(safe-area-inset-bottom)); cursor:pointer; color:var(--dim); font-family:var(--sans); font-weight:700; font-size:14px; }
    .tab-btn.active { color:var(--celeste); border-top-color:var(--celeste); }

    .chart-box { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 8px 6px; margin-bottom:14px; }
    .chart-title { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--dim); padding:0 8px 8px; }
    .ride-row { display:flex; width:100%; text-align:left; align-items:center; justify-content:space-between; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:8px; cursor:pointer; color:var(--text); font-family:var(--sans); }
    .ride-row-date { font-weight:700; font-size:14px; }
    .ride-row-sub { color:var(--dim); font-size:12px; margin-top:2px; }
    .ride-row-dist { font-family:var(--mono); font-size:18px; font-weight:700; color:var(--celeste); white-space:nowrap; }
    .ride-row-unit { font-size:11px; color:var(--dim); margin-left:3px; font-family:var(--sans); }
    .empty-state { color:var(--dim); text-align:center; padding:28px 16px; background:var(--panel); border-radius:14px; border:1px solid var(--line); font-size:14px; line-height:1.5; }
    .back-btn { background:none; border:none; color:var(--celeste); font-size:14px; font-weight:700; cursor:pointer; padding:0; margin-bottom:10px; font-family:var(--sans); }
    .detail-title { font-size:16px; font-weight:700; margin-bottom:2px; }
    .detail-sub { color:var(--dim); font-size:13px; margin-bottom:12px; }
    .btn-delete { margin-top:16px; width:100%; background:none; border:1px solid #4A2E26; color:var(--coral); border-radius:12px; padding:12px 0; font-weight:700; font-size:14px; cursor:pointer; font-family:var(--sans); }
    .dim { color:var(--dim); font-weight:400; }
    .hidden { display:none !important; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo"><span class="dot">●</span> Cadence</div>
    <button class="unit-toggle" id="bUnits">KM</button>
  </div>

  <!-- ───────── RIDE VIEW ───────── -->
  <div id="viewRide">
    <div class="speed-box">
      <div class="speed-label" id="speedLabel">Current speed</div>
      <div class="speed-big" id="speedBig">0.0</div>
      <div class="speed-unit" id="speedUnit">km/h</div>
      <div class="gps-pill hidden" id="gpsPill">GPS ±–</div>
    </div>
    <div class="stat-row">
      <div class="stat-tile"><div class="stat-label">Distance</div><div class="stat-value" id="vDist">0.00<span class="stat-unit" id="uDist">km</span></div></div>
      <div class="stat-tile"><div class="stat-label">Time</div><div class="stat-value" id="vTime">0:00</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-tile"><div class="stat-label">Avg speed</div><div class="stat-value" id="vAvg">0.0<span class="stat-unit" id="uAvg">km/h</span></div></div>
      <div class="stat-tile"><div class="stat-label">Max speed</div><div class="stat-value max-col" id="vMax">0.0<span class="stat-unit" id="uMax">km/h</span></div></div>
    </div>
    <div class="map-box">
      <div class="map" id="liveMap"></div>
      <div class="map-empty" id="liveMapEmpty">Your route will appear here once GPS locks on</div>
    </div>
    <div id="alerts"></div>
    <div class="controls" id="controls"></div>
  </div>

  <!-- ───────── HISTORY VIEW ───────── -->
  <div id="viewHistory" class="hidden">
    <div id="histList"></div>
    <div id="histDetail" class="hidden">
      <button class="back-btn" id="bBack">← All rides</button>
      <div class="detail-title" id="dTitle"></div>
      <div class="detail-sub" id="dSub"></div>
      <div class="map-box"><div class="map" id="detailMap" style="height:260px"></div></div>
      <div class="stat-row" style="margin-top:12px">
        <div class="stat-tile"><div class="stat-label">Distance</div><div class="stat-value" id="dDist"></div></div>
        <div class="stat-tile"><div class="stat-label">Time</div><div class="stat-value" id="dTime"></div></div>
      </div>
      <div class="stat-row">
        <div class="stat-tile"><div class="stat-label">Avg speed</div><div class="stat-value" id="dAvg"></div></div>
        <div class="stat-tile"><div class="stat-label">Max speed</div><div class="stat-value max-col" id="dMax"></div></div>
      </div>
      <button class="btn-delete" id="bDelete">Delete ride</button>
    </div>
  </div>
</div>

<div class="tab-bar"><div class="tab-bar-inner">
  <button class="tab-btn active" id="tabRide">Ride</button>
  <button class="tab-btn" id="tabHistory">History</button>
</div></div>

<script>
'use strict';

// ───────── Tuning: GPS quality filters ─────────
const MAX_ACCURACY_M   = 35;   // ignore fixes with worse accuracy than this (meters)
const MAX_SPEED_MS     = 29;   // ~65 mph / 104 km/h — anything faster is a GPS glitch, discard
const MIN_MOVE_M       = 2.5;  // ignore jitter smaller than this
const MIN_DT_S         = 0.4;  // minimum seconds between points for speed calc
const SPEED_SMOOTHING  = 3;    // average speed over the last N readings
const STALE_SPEED_MS   = 5000; // zero the speedometer if no movement for this long

const KEY_RIDES = 'cadence_rides';
const KEY_UNITS = 'cadence_units';

// ───────── State ─────────
const S = {
  tab: 'ride', units: localStorage.getItem(KEY_UNITS) || 'km',
  status: 'idle', points: [], distance: 0, elapsed: 0,
  speed: 0, maxSpeed: 0, isDemo: false, rides: [], selectedId: null,
  accuracy: null,
};
try { S.rides = JSON.parse(localStorage.getItem(KEY_RIDES) || '[]'); } catch(e) {}

let watchId=null, demoTimer=null, tickTimer=null, wakeLock=null;
let lastPt=null, demoAngle=0, speedBuf=[];
let liveMap=null, livePoly=null, liveMarker=null, detailMap=null;
const hasLeaflet = typeof L !== 'undefined';

// ───────── Helpers ─────────
const $ = id => document.getElementById(id);
const toRad = d => d*Math.PI/180;
function haversine(a,b){const R=6371000,dLat=toRad(b.lat-a.lat),dLng=toRad(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));}
function fmtTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=Math.floor(s%60);
  return (h>0?h+':':'')+String(m).padStart(h>0?2:1,'0')+':'+String(ss).padStart(2,'0');}
const speedVal=ms=>S.units==='km'?ms*3.6:ms*2.23694;
const distVal=m=>S.units==='km'?m/1000:m/1609.344;
const speedUnit=()=>S.units==='km'?'km/h':'mph';
const distUnit=()=>S.units==='km'?'km':'mi';
function downsample(pts,max=500){if(pts.length<=max)return pts;
  const step=pts.length/max,out=[];for(let i=0;i<max;i++)out.push(pts[Math.floor(i*step)]);
  out.push(pts[pts.length-1]);return out;}
function saveRides(){try{localStorage.setItem(KEY_RIDES,JSON.stringify(S.rides));}catch(e){}}

// ───────── Maps ─────────
function makeMap(elId){
  const m=L.map(elId,{zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(m);
  L.control.attribution({prefix:false}).addAttribution('© OpenStreetMap © CARTO').addTo(m);
  return m;
}
function initLiveMap(){
  if(!hasLeaflet||liveMap)return;
  liveMap=makeMap('liveMap');
  liveMap.setView([39.5,-98.35],4); // neutral default until GPS locks
  livePoly=L.polyline([],{color:'#53D6C5',weight:4,opacity:0.95}).addTo(liveMap);
  liveMarker=L.circleMarker([0,0],{radius:7,color:'#fff',weight:2,fillColor:'#53D6C5',fillOpacity:1});
}
function resetLiveRoute(){
  if(!hasLeaflet)return;
  initLiveMap();
  livePoly.setLatLngs([]);
  if(liveMarker)liveMarker.remove();
  $('liveMapEmpty').classList.remove('hidden');
}
function pushLivePoint(lat,lng){
  if(!hasLeaflet)return;
  initLiveMap();
  $('liveMapEmpty').classList.add('hidden');
  livePoly.addLatLng([lat,lng]);
  liveMarker.setLatLng([lat,lng]);
  if(!liveMap.hasLayer(liveMarker))liveMarker.addTo(liveMap);
  if(S.points.length<=2){liveMap.setView([lat,lng],16);}
  else{liveMap.panTo([lat,lng],{animate:true,duration:0.5});}
}
function showDetailMap(route){
  if(!hasLeaflet||!route||route.length<2)return;
  if(detailMap){detailMap.remove();detailMap=null;}
  detailMap=makeMap('detailMap');
  const latlngs=route.map(p=>[p.lat,p.lng]);
  L.polyline(latlngs,{color:'#53D6C5',weight:4,opacity:0.95}).addTo(detailMap);
  L.circleMarker(latlngs[0],{radius:6,color:'#53D6C5',weight:2,fillColor:'#14171D',fillOpacity:1}).addTo(detailMap);
  L.circleMarker(latlngs[latlngs.length-1],{radius:6,color:'#fff',weight:2,fillColor:'#53D6C5',fillOpacity:1}).addTo(detailMap);
  detailMap.fitBounds(L.latLngBounds(latlngs),{padding:[24,24]});
  setTimeout(()=>detailMap&&detailMap.invalidateSize(),60);
}

// ───────── Live UI updates ─────────
function setText(id,t){const el=$(id);if(el&&el.firstChild)el.firstChild.nodeValue=t;else if(el)el.textContent=t;}
function updateUnits(){
  $('bUnits').textContent=S.units.toUpperCase();
  $('speedUnit').textContent=speedUnit();
  ['uDist'].forEach(i=>$(i).textContent=distUnit());
  ['uAvg','uMax'].forEach(i=>$(i).textContent=speedUnit());
}
function updateStats(){
  const avg=S.elapsed>0?S.distance/S.elapsed:0;
  $('speedBig').textContent=speedVal(S.speed).toFixed(1);
  setText('vDist',distVal(S.distance).toFixed(2));
  setText('vTime',fmtTime(S.elapsed));
  setText('vAvg',speedVal(avg).toFixed(1));
  setText('vMax',speedVal(S.maxSpeed).toFixed(1));
  $('speedLabel').textContent=S.status==='recording'?(S.isDemo?'Demo ride · recording':'Recording'):S.status==='paused'?'Paused':'Current speed';
  $('speedBig').classList.toggle('paused',S.status==='paused');
  const pill=$('gpsPill');
  if(S.status!=='idle'&&!S.isDemo&&S.accuracy!=null){pill.classList.remove('hidden');pill.textContent='GPS ±'+Math.round(S.accuracy)+' m';}
  else pill.classList.add('hidden');
}
function renderControls(){
  $('controls').innerHTML=S.status==='idle'
    ?'<button class="btn btn-primary" id="bStart">Start ride</button><button class="btn btn-secondary" id="bDemo">Demo ride</button>'
    :'<button class="btn btn-amber" id="bPause">'+(S.status==='paused'?'Resume':'Pause')+'</button><button class="btn btn-coral" id="bFinish">Finish</button>';
  if($('bStart'))$('bStart').onclick=()=>startRide(false);
  if($('bDemo'))$('bDemo').onclick=()=>startRide(true);
  if($('bPause'))$('bPause').onclick=pauseRide;
  if($('bFinish'))$('bFinish').onclick=finishRide;
}
function showAlert(type,msg){$('alerts').innerHTML=msg?'<div class="alert alert-'+type+'">'+msg+'</div>':'';}

// ───────── GPS ingestion with filtering ─────────
function ingestPoint(lat,lng,gpsSpd,accuracy){
  if(S.status!=='recording')return;
  // Filter 1: reject poor-accuracy fixes entirely
  if(accuracy!=null){S.accuracy=accuracy;if(accuracy>MAX_ACCURACY_M){updateStats();return;}}
  const pt={lat,lng,t:Date.now()};
  if(lastPt){
    const d=haversine(lastPt,pt);
    const dt=(pt.t-lastPt.t)/1000;
    if(d<MIN_MOVE_M)return;                    // Filter 2: jitter
    if(dt<MIN_DT_S)return;                     // Filter 3: too-rapid duplicate fixes
    const v=d/dt;
    if(v>MAX_SPEED_MS){lastPt=pt;return;}      // Filter 4: impossible jump → discard segment, re-anchor
    S.distance+=d;
    // Speed: prefer device speed if sane, else computed; smooth over last N
    let inst=(gpsSpd!=null&&gpsSpd>=0&&gpsSpd<MAX_SPEED_MS)?gpsSpd:v;
    speedBuf.push(inst);
    if(speedBuf.length>SPEED_SMOOTHING)speedBuf.shift();
    S.speed=speedBuf.reduce((a,b)=>a+b,0)/speedBuf.length;
    if(S.speed>S.maxSpeed)S.maxSpeed=S.speed;
  } else {
    // first accepted fix
    if(gpsSpd!=null&&gpsSpd>=0&&gpsSpd<MAX_SPEED_MS)S.speed=gpsSpd;
  }
  lastPt=pt;
  S.points.push(pt);
  pushLivePoint(lat,lng);
  updateStats();
}

// ───────── Ride control ─────────
function stopAll(){
  if(watchId!=null){try{navigator.geolocation.clearWatch(watchId);}catch(e){}watchId=null;}
  if(demoTimer){clearInterval(demoTimer);demoTimer=null;}
  if(tickTimer){clearInterval(tickTimer);tickTimer=null;}
  if(wakeLock){try{wakeLock.release();}catch(e){}wakeLock=null;}
}
async function startRide(demo){
  stopAll();
  Object.assign(S,{points:[],distance:0,elapsed:0,speed:0,maxSpeed:0,isDemo:demo,status:'recording',accuracy:null});
  lastPt=null;speedBuf=[];
  showAlert();resetLiveRoute();renderControls();updateStats();
  tickTimer=setInterval(()=>{
    if(S.status==='recording'){
      S.elapsed++;
      if(lastPt&&Date.now()-lastPt.t>STALE_SPEED_MS){S.speed=0;speedBuf=[];}
      updateStats();
    }
  },1000);
  if('wakeLock' in navigator)try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}

  if(demo){
    demoAngle=0;
    const base={lat:28.989,lng:-80.902}; // Edgewater-ish
    demoTimer=setInterval(()=>{
      demoAngle+=0.05+Math.random()*0.015;
      const a=demoAngle,r=0.004+0.001*Math.sin(a*2.1);
      ingestPoint(base.lat+r*Math.sin(a)+0.00006*Math.sin(a*9),
                  base.lng+r*1.3*Math.cos(a*0.85)+0.00006*Math.cos(a*6),
                  4+3*Math.abs(Math.sin(a*1.9)),5);
    },1000);
    return;
  }
  if(!navigator.geolocation){
    S.status='idle';stopAll();renderControls();
    showAlert('error',"Location isn't available in this browser. Try the demo ride.");return;
  }
  watchId=navigator.geolocation.watchPosition(
    p=>ingestPoint(p.coords.latitude,p.coords.longitude,p.coords.speed,p.coords.accuracy),
    e=>{S.status='idle';stopAll();renderControls();updateStats();
      showAlert('error',e.code===1?'Location permission denied. Allow access in Settings and try again, or use the demo ride.':'Couldn\'t get a GPS fix. Move to open sky and try again, or use the demo ride.');},
    {enableHighAccuracy:true,maximumAge:1000,timeout:20000}
  );
}
function pauseRide(){
  S.status=S.status==='paused'?'recording':'paused';
  if(S.status==='recording'){lastPt=null;speedBuf=[];}
  renderControls();updateStats();
}
function finishRide(){
  stopAll();
  const{elapsed:dur,distance:dist,points:pts,maxSpeed:mx,isDemo}=S;
  S.status='idle';S.speed=0;S.accuracy=null;
  renderControls();updateStats();
  if(dist>=10&&pts.length>=2){
    S.rides.unshift({id:Date.now(),date:new Date().toISOString(),duration:dur,distance:dist,
      avgSpeed:dur>0?dist/dur:0,maxSpeed:mx,demo:isDemo,
      route:downsample(pts).map(p=>({lat:+p.lat.toFixed(5),lng:+p.lng.toFixed(5)}))});
    saveRides();
    showAlert('success','Ride saved — view it in History.');
  } else {
    showAlert('error','Ride too short to save (under 10 m of movement).');
  }
}

// ───────── History ─────────
function barSVG(data){
  const W=320,H=100,PL=26,PB=20,PT=6,PR=6,bw=(W-PL-PR)/data.length,GAP=5,ch=H-PT-PB;
  const mx=Math.max(...data.map(d=>d.v),0.01);let bars='',labs='';
  data.forEach((d,i)=>{const x=PL+i*bw+GAP/2,bW=bw-GAP,bH=Math.max(2,(d.v/mx)*ch),y=PT+ch-bH;
    bars+='<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bW.toFixed(1)+'" height="'+bH.toFixed(1)+'" rx="3" fill="#53D6C5"/>';
    labs+='<text x="'+(x+bW/2).toFixed(1)+'" y="'+H+'" text-anchor="middle" fill="#8B93A3" font-size="10" font-family="system-ui">'+d.l+'</text>';});
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;display:block;">'+bars+labs+
    '<text x="'+(PL-3)+'" y="'+(PT+ch)+'" text-anchor="end" fill="#8B93A3" font-size="9" font-family="system-ui">0</text>'+
    '<text x="'+(PL-3)+'" y="'+(PT+8)+'" text-anchor="end" fill="#8B93A3" font-size="9" font-family="system-ui">'+mx.toFixed(1)+'</text></svg>';
}
function renderHistory(){
  const totD=S.rides.reduce((s,r)=>s+r.distance,0);
  const totT=S.rides.reduce((s,r)=>s+r.duration,0);
  const days=[];
  for(let i=6;i>=0;i--){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()-i);
    const n=new Date(d);n.setDate(d.getDate()+1);
    const sum=S.rides.filter(r=>{const t=new Date(r.date);return t>=d&&t<n;}).reduce((s,r)=>s+r.distance,0);
    days.push({l:d.toLocaleDateString(undefined,{weekday:'narrow'}),v:+distVal(sum).toFixed(1)});}
  const list=S.rides.length===0
    ?'<div class="empty-state">No rides yet. Tap Start ride on the Ride tab, or try the demo first.</div>'
    :S.rides.map(r=>'<button class="ride-row" data-id="'+r.id+'"><div><div class="ride-row-date">'+
      new Date(r.date).toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})+
      (r.demo?'<span class="dim"> · demo</span>':'')+'</div><div class="ride-row-sub">'+
      fmtTime(r.duration)+' &middot; avg '+speedVal(r.avgSpeed).toFixed(1)+' '+speedUnit()+
      '</div></div><div class="ride-row-dist">'+distVal(r.distance).toFixed(1)+
      '<span class="ride-row-unit">'+distUnit()+'</span></div></button>').join('');
  $('histList').innerHTML=
    '<div class="stat-row">'+
    '<div class="stat-tile"><div class="stat-label">Rides</div><div class="stat-value">'+S.rides.length+'</div></div>'+
    '<div class="stat-tile"><div class="stat-label">Total dist</div><div class="stat-value">'+distVal(totD).toFixed(1)+'<span class="stat-unit">'+distUnit()+'</span></div></div>'+
    '<div class="stat-tile"><div class="stat-label">Total time</div><div class="stat-value">'+fmtTime(totT)+'</div></div></div>'+
    '<div class="chart-box"><div class="chart-title">Last 7 days &middot; '+distUnit()+'</div>'+barSVG(days)+'</div>'+list;
  document.querySelectorAll('.ride-row').forEach(b=>b.onclick=()=>openDetail(parseInt(b.dataset.id)));
}
function openDetail(id){
  const r=S.rides.find(x=>x.id===id);if(!r)return;
  S.selectedId=id;
  $('histList').classList.add('hidden');
  $('histDetail').classList.remove('hidden');
  $('dTitle').innerHTML=new Date(r.date).toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'})+(r.demo?'<span class="dim"> · demo</span>':'');
  $('dSub').textContent=new Date(r.date).toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});
  $('dDist').innerHTML=distVal(r.distance).toFixed(2)+'<span class="stat-unit">'+distUnit()+'</span>';
  $('dTime').textContent=fmtTime(r.duration);
  $('dAvg').innerHTML=speedVal(r.avgSpeed).toFixed(1)+'<span class="stat-unit">'+speedUnit()+'</span>';
  $('dMax').innerHTML=speedVal(r.maxSpeed).toFixed(1)+'<span class="stat-unit">'+speedUnit()+'</span>';
  showDetailMap(r.route);
}
function closeDetail(){
  S.selectedId=null;
  if(detailMap){detailMap.remove();detailMap=null;}
  $('histDetail').classList.add('hidden');
  $('histList').classList.remove('hidden');
}

// ───────── Tabs & wiring ─────────
function switchTab(t){
  S.tab=t;
  $('tabRide').classList.toggle('active',t==='ride');
  $('tabHistory').classList.toggle('active',t==='history');
  $('viewRide').classList.toggle('hidden',t!=='ride');
  $('viewHistory').classList.toggle('hidden',t!=='history');
  if(t==='history'){closeDetail();renderHistory();}
  else if(liveMap)setTimeout(()=>liveMap.invalidateSize(),60);
}
$('tabRide').onclick=()=>switchTab('ride');
$('tabHistory').onclick=()=>switchTab('history');
$('bBack').onclick=closeDetail;
$('bDelete').onclick=()=>{
  S.rides=S.rides.filter(r=>r.id!==S.selectedId);
  saveRides();closeDetail();renderHistory();
};
$('bUnits').onclick=()=>{
  S.units=S.units==='km'?'mi':'km';
  try{localStorage.setItem(KEY_UNITS,S.units);}catch(e){}
  updateUnits();updateStats();
  if(S.tab==='history'){S.selectedId?openDetail(S.selectedId):renderHistory();}
};

// ───────── PWA manifest ─────────
(function(){try{
  const m={name:'Cadence',short_name:'Cadence',start_url:location.href,display:'standalone',background_color:'#14171D',theme_color:'#14171D'};
  const link=document.createElement('link');link.rel='manifest';
  link.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}));
  document.head.appendChild(link);
}catch(e){}})();

// ───────── Boot ─────────
updateUnits();updateStats();renderControls();
if(hasLeaflet)initLiveMap();
else $('liveMapEmpty').textContent='Map unavailable (offline) — stats still record fine';
</script>
</body>
</html>
